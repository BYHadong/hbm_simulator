<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>HBM TSV 최적화 시뮬레이터</title>
    <link rel="stylesheet" href="./index.css" />
    <script src="./index.js" defer></script>
  </head>
  <body>
    <div class="container">
      <h1>HBM TSV 열방산 시뮬레이터</h1>

      <div class="settings-panel">
        <div class="setting-item">
          <label for="inputGridSize">너비 (N x N):</label>
          <input type="number" id="inputGridSize" min="3" max="10" step="1" />
        </div>
        <div class="setting-item">
          <label for="inputNumLayers">HBM 층수:</label>
          <input type="number" id="inputNumLayers" min="2" max="12" step="1" />
        </div>
        <button id="btnApply">적용 및 리셋</button>
      </div>

      <div class="dashboard">
        <div class="stat-box">
          <div class="stat-title">현재 최고 온도</div>
          <div class="stat-value" id="currentTempDisplay">-- °C</div>
          <div class="stat-title" style="margin-top: 5px">
            목표: <span id="targetTempDisplay">--</span> °C
          </div>
        </div>
        <div class="stat-box">
          <div class="stat-title">설치된 TSV 클러스터</div>
          <div
            class="stat-value"
            id="tsvCountDisplay"
            style="color: var(--copper)"
          >
            0
          </div>
          <div class="stat-title" style="margin-top: 5px" id="layerDisplay">
            (--Hi HBM)
          </div>
        </div>
      </div>

      <div class="progress-bar-container">
        <div class="progress-bar" id="tempProgressBar"></div>
      </div>

      <div
        style="
          text-align: center;
          margin: 20px 0 10px;
          font-size: 0.9rem;
          color: #6c757d;
        "
      >
        열이 발생하는 칩(중앙) 근처를 클릭하여 구리 기둥(TSV)을 꽂아 온도를
        낮추세요.
      </div>

      <div class="grid-container" id="grid">
        <!-- Cells will be generated here -->
      </div>

      <div class="message-area" id="messageArea"></div>
    </div>
  </body>
</html>
